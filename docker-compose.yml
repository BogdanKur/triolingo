services:
  postgres:
    image: postgres:16-alpine
    container_name: triolingo-postgres
    environment:
      POSTGRES_DB: triolingo
      POSTGRES_USER: triolingo
      POSTGRES_PASSWORD: triolingo
    volumes:
      - triolingo_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triolingo -d triolingo"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: triolingo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 5s

  api:
    build:
      context: ./backend
    container_name: triolingo-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 4000
      JWT_SECRET: triolingo-dev-secret
      DATABASE_URL: postgres://triolingo:triolingo@postgres:5432/triolingo
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:4000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      TELEGRAM_CLIENT_ID: ${TELEGRAM_CLIENT_ID:-}
      TELEGRAM_CLIENT_SECRET: ${TELEGRAM_CLIENT_SECRET:-}
    ports:
      - "4000:4000"
    restart: on-failure
    command: sh -c "npm run migrate && npm run seed && npm run start"

volumes:
  triolingo_postgres_data:
